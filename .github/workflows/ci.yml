name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Typecheck · Build · Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # No secrets needed: when Supabase env vars are absent the app
    # falls back to static content by design, which is exactly what
    # the smoke suite asserts against.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: https://oliveafarmtotable.com

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke tests
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SITE_URL: https://oliveafarmtotable.com

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
